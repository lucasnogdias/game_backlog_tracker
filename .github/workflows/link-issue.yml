name: Link PR to Issue

# Auto-links a PR to the issue that shares its TASK-XXXX/BUG-XXXX prefix (looked
# up from the PR title, falling back to the branch name), by appending a
# "Closes #N" line to the PR body. GitHub's native closing-keyword handling
# then closes that issue automatically once the PR is merged into `main`.

on:
  pull_request:
    types: [opened, edited]

permissions:
  issues: read
  pull-requests: write

jobs:
  link-issue:
    name: Auto-link matching issue
    runs-on: ubuntu-latest
    steps:
      - name: Link matching issue by TASK/BUG prefix
        uses: actions/github-script@v8
        with:
          script: |
            const prefixPattern = /\b(TASK|BUG)-(\d+)\b/i;

            const title = context.payload.pull_request.title || "";
            const branch = context.payload.pull_request.head.ref || "";
            const match = prefixPattern.exec(title) || prefixPattern.exec(branch);

            if (!match) {
              core.info("No TASK-XXXX/BUG-XXXX prefix found in the PR title or branch name.");
              return;
            }

            const prefix = `${match[1].toUpperCase()}-${match[2]}`;
            core.info(`Detected prefix: ${prefix}`);

            const body = context.payload.pull_request.body || "";
            const closingKeywordPattern = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i;
            if (closingKeywordPattern.test(body)) {
              core.info("PR body already references a closing issue; leaving it as-is.");
              return;
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });

            const matchingIssue = issues.find(
              (issue) =>
                !issue.pull_request &&
                issue.title.toUpperCase().startsWith(prefix)
            );

            if (!matchingIssue) {
              core.info(`No open issue found with a title starting with "${prefix}".`);
              return;
            }

            const newBody = `${body}\n\nCloses #${matchingIssue.number}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: newBody,
            });

            core.info(`Linked PR to issue #${matchingIssue.number} ("${matchingIssue.title}").`);
