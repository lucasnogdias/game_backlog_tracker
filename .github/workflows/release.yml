name: Release desktop app

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches package version
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v$version" = "$RELEASE_TAG"
          echo "value=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            command: pnpm electron:build:mac
            artifact-name: macos-arm64
            artifact-path: dist/*.dmg
          - name: Windows x64
            os: windows-latest
            command: pnpm electron:build:win
            artifact-name: windows-x64
            artifact-path: dist/*.exe
          - name: Linux x64
            os: ubuntu-latest
            command: pnpm electron:build:linux
            artifact-name: linux-x64
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: node_version
        shell: bash
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node_version.outputs.version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Build installer
        run: ${{ matrix.command }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [validate-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.validate-version.outputs.version }}
        run: |
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Game Backlog Tracker $VERSION" \
            --generate-notes
